<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authorization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
    <style>

* {
    padding: 0;
    margin: 0;
}

body {
    font-family: "Arial Black";
    background: no-repeat center center fixed linear-gradient(60deg, #800080, #0000FF);
    -webkit-background-size: cover;
    -moz-background-size: cover;
    -o-background-size: cover;
    background-size: cover;
    color: aliceblue;
}

.card {
    border-radius: 25px;
    margin: 10px;
    width: 60%;
    margin-left: 5%;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgba(0, 0, 0, 0.3);
    height: 5%;
    width: 100%;
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
}

.btn-lg {
    width: 100%;
    height: 150%;
}

.btnStart1 {
    border-top-left-radius: 30px;
    border-bottom-right-radius: 30px;
    display: flex;
    justify-content: center;
}

.auth-content {
    position: relative;
    min-height: 520px;
}

.auth-card {
    z-index: 1;
}

.auth-squares {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
}

.auth-square {
    position: absolute;
    left: var(--x);
    top: var(--y);
    width: var(--size);
    height: var(--size);
    transform: translate(-50%, -50%) rotate(var(--start));
    background: var(--fill);
    border: 2px solid var(--border);
    box-shadow: 0 0 22px rgba(127, 204, 172, 0.14);
    animation: authSpin var(--dur) linear infinite;
    border-radius: 8px;
}

@keyframes authSpin {
    from {
        transform: translate(-50%, -50%) rotate(var(--start));
    }
    to {
        transform: translate(-50%, -50%) rotate(calc(var(--start) + 360deg));
    }
}

@media (prefers-reduced-motion: reduce) {
    .auth-square {
        animation: none;
    }
}
    </style>
</head>
<body>
<nav class="navbar bg-body-tertiary navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="img/logo.jpg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Переключатель навигации">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="navbar-brand" href="index.html">Payly</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="registration.html">Регистрация</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="content.html">Подписки</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<br><br><br>
<div class="auth-content">
    <div class="card auth-card justify-content-start pl-4">
        <div class="display-2 m-4 card-header">Авторизация</div>
        <form class="m-4" id="authForm">
            <div id="authError" class="alert alert-danger d-none" role="alert"></div>
            <div class="mb-3">
                <label for="emailAuth" class="form-label">Адрес электронной почты</label>
                <input type="email" class="form-control" id="emailAuth" aria-describedby="emailHelp" required >
            </div>
            <div class="mb-3">
                <label for="passAuth" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="passAuth" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="Check1" required>
                <label class="form-check-label" for="Check1">Согласен с условиями <a href="https://docs.google.com/document/d/11qICZJR92waNmW4tAjfvv-ZagPOJxE6k33590REEy5k/edit?usp=sharing" class="link-info link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover" target="_blank">пользовательского соглашение</a></label>
            </div>
            <button type="submit" class="btn btn-primary">Вход</button>
        </form>
    </div>

    <div class="auth-squares" aria-hidden="true">
        <div class="auth-square" style="--x: 35%; --y: 18%; --size: 90px; --fill: rgba(121,126,147,0.18); --border: rgba(121,126,147,0.55); --dur: 7.5s; --delay: -1.2s; --start: 15deg;"></div>
        <div class="auth-square" style="--x: 68%; --y: 12%; --size: 60px; --fill: rgba(127,204,172,0.18); --border: rgba(127,204,172,0.6); --dur: 6.2s; --delay: -2.5s; --start: 120deg;"></div>
        <div class="auth-square" style="--x: 82%; --y: 42%; --size: 110px; --fill: rgba(121,126,147,0.14); --border: rgba(121,126,147,0.45); --dur: 9s; --delay: -3.6s; --start: 40deg;"></div>
        <div class="auth-square" style="--x: 55%; --y: 66%; --size: 75px; --fill: rgba(127,204,172,0.14); --border: rgba(127,204,172,0.5); --dur: 8.1s; --delay: -0.7s; --start: 210deg;"></div>
        <div class="auth-square" style="--x: 40%; --y: 58%; --size: 55px; --fill: rgba(127,204,172,0.12); --border: rgba(127,204,172,0.45); --dur: 5.6s; --delay: -1.9s; --start: 305deg;"></div>
        <div class="auth-square" style="--x: 40%; --y: 38%; --size: 35px; --fill: rgba(121,126,147,0.16); --border: rgba(121,126,147,0.55); --dur: 4.8s; --delay: -2.2s; --start: 70deg;"></div>
    </div>
</div>

<script src="payly.js"></script>
<script>
  const form = document.getElementById("authForm");
  const errorEl = document.getElementById("authError");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setFormError(errorEl, "");

    const email = document.getElementById("emailAuth").value.trim();
    const password = document.getElementById("passAuth").value;

    try {
      const data = await apiFetch("/login", {
        method: "POST",
        body: { email, password },
      });
      setToken(data.access_token);
      window.location.href = "content.html";
    } catch (err) {
      setFormError(errorEl, err.message || "Ошибка входа");
    }
  });
</script>
</body>
</html>
