<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subscriptions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-body-tertiary navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">
      <img src="img/logo.jpg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
      Payly
    </a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary" href="auth.html" id="loginLink">Вход</a>
      <button class="btn btn-outline-danger d-none" id="logoutBtn" type="button">Выйти</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div id="contentError" class="alert alert-danger d-none" role="alert"></div>

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <div class="h3 mb-0">Подписки</div>
      <div class="text-muted" id="userEmail"></div>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-header">Добавить подписку</div>
    <div class="card-body">
      <form id="createSubForm" class="row g-3">
        <div class="col-md-4">
          <label class="form-label" for="subName">Название</label>
          <input class="form-control" id="subName" required />
        </div>
        <div class="col-md-2">
          <label class="form-label" for="subPrice">Цена</label>
          <input class="form-control" id="subPrice" type="number" min="0" step="0.01" required />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="subCycle">Цикл</label>
          <select class="form-select" id="subCycle" required>
            <option value="monthly">monthly</option>
            <option value="yearly">yearly</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label" for="subNextDate">Следующий платёж</label>
          <input class="form-control" id="subNextDate" type="date" required />
        </div>
        <div class="col-12">
          <button class="btn btn-primary" type="submit">Добавить</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Список</div>
    <div class="card-body">
      <div id="subsEmpty" class="text-muted d-none">Пока подписок нет</div>
      <div class="table-responsive">
        <table class="table table-striped align-middle mb-0">
          <thead>
          <tr>
            <th>Название</th>
            <th>Цена</th>
            <th>Цикл</th>
            <th>След. платёж</th>
            <th style="width: 1%"></th>
          </tr>
          </thead>
          <tbody id="subsTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="payly.js"></script>
<script>
  const errorEl = document.getElementById("contentError");
  const userEmailEl = document.getElementById("userEmail");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginLink = document.getElementById("loginLink");
  const subsTbody = document.getElementById("subsTbody");
  const subsEmpty = document.getElementById("subsEmpty");

  function renderSubs(items) {
    subsTbody.innerHTML = "";
    subsEmpty.classList.toggle("d-none", items.length !== 0);

    for (const s of items) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${escapeHtml(s.name)}</td>
        <td>${Number(s.price).toFixed(2)}</td>
        <td>${escapeHtml(s.billing_cycle)}</td>
        <td>${escapeHtml(String(s.next_payment_date))}</td>
        <td>
          <button class="btn btn-sm btn-outline-danger" data-id="${s.id}">Удалить</button>
        </td>
      `;
      tr.querySelector("button").addEventListener("click", async () => {
        try {
          setFormError(errorEl, "");
          await apiFetch(`/subscriptions/${s.id}`, { method: "DELETE", auth: true });
          await loadSubs();
        } catch (err) {
          setFormError(errorEl, err.message || "Ошибка удаления");
        }
      });
      subsTbody.appendChild(tr);
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function loadMe() {
    const token = getToken();
    if (!token) {
      window.location.href = "auth.html";
      return null;
    }
    try {
      const me = await apiFetch("/me", { auth: true });
      userEmailEl.textContent = me.email;
      logoutBtn.classList.remove("d-none");
      loginLink.classList.add("d-none");
      return me;
    } catch (err) {
      clearToken();
      window.location.href = "auth.html";
      return null;
    }
  }

  async function loadSubs() {
    const items = await apiFetch("/subscriptions/", { auth: true });
    renderSubs(items || []);
  }

  document.getElementById("createSubForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    setFormError(errorEl, "");

    const name = document.getElementById("subName").value.trim();
    const price = Number(document.getElementById("subPrice").value);
    const billing_cycle = document.getElementById("subCycle").value;
    const next_payment_date = document.getElementById("subNextDate").value;

    try {
      await apiFetch("/subscriptions/", {
        method: "POST",
        auth: true,
        body: { name, price, billing_cycle, next_payment_date },
      });
      e.target.reset();
      await loadSubs();
    } catch (err) {
      setFormError(errorEl, err.message || "Ошибка создания подписки");
    }
  });

  logoutBtn.addEventListener("click", async () => {
    try {
      await apiFetch("/logout", { method: "POST", auth: true });
    } catch (_) {
      // ignore
    } finally {
      clearToken();
      window.location.href = "auth.html";
    }
  });

  (async () => {
    await loadMe();
    await loadSubs();
  })();
</script>
</body>
</html>
