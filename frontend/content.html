<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subscriptions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">
  <style>
    body{
       font-family: "Arial Black";
    background: no-repeat center center fixed linear-gradient(60deg, #800080, #0000FF);
    -webkit-background-size: cover;
    -moz-background-size: cover;
    -o-background-size: cover;
    background-size: cover;
    color: aliceblue;
    }
    .gmailtext{
      color: white;
      justify-content: center;
    }
   .user-subscriptions-header {
      text-align: center;
    }
    .user-email-display {
      color: #ffffff;
    }
    .butttext{
      text-align: center;
      align-items: center;
    }
  </style>
</head>
<body>
<nav class="navbar bg-body-tertiary navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">
      <img src="img/logo.jpg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
      Payly
    </a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary" href="auth.html" id="loginLink">Вход</a>
      <button class="btn btn-outline-danger d-none" id="logoutBtn" type="button">Выйти</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div id="contentError" class="alert alert-danger d-none" role="alert"></div>
  <div id="contentSuccess" class="alert alert-success d-none" role="alert"></div>

  <div class="user-subscriptions-header mb-3">
    <div>
      <div class="h3 mb-0">Подписки пользователя</div>
      <div class="user-email-display" id="userEmail"></div>
    </div>
  </div>

  <div class="mb-3">
    <div class="butttext">
    <button class="btn btn-info" id="importFromEmailBtn" type="button">
      Подставить подписки из почты
    </button>
    <div class="gmailtext">
      Подключите Gmail, затем импортируем данные подписок.
    </div>
  </div>
  </div>

  <div id="emailCandidatesCard" class="card mb-4 d-none">
    <div class="card-header">Кандидаты на импорт из почты</div>
    <div class="card-body">
      <div id="emailCandidatesMeta" class="text-muted mb-2"></div>
      <div id="emailCandidatesList" class="mb-3"></div>
      <div class="d-flex gap-2">
        <button id="emailCandidatesImportBtn" class="btn btn-primary" type="button" disabled>
          Импортировать выбранные
        </button>
        <button id="emailCandidatesCancelBtn" class="btn btn-outline-secondary" type="button">
          Скрыть
        </button>
      </div>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-header">Добавить подписку</div>
    <div class="card-body">
      <form id="createSubForm" class="row g-3">
        <div class="col-md-4">
          <label class="form-label" for="subName">Название</label>
          <input class="form-control" id="subName" required />
        </div>
        <div class="col-md-2">
          <label class="form-label" for="subPrice">Цена</label>
          <input class="form-control" id="subPrice" type="number" min="0" step="0.01" required />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="subCycle">Цикл</label>
          <select class="form-select" id="subCycle" required>
            <option value="monthly">monthly</option>
            <option value="yearly">yearly</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label" for="subNextDate">Следующий платёж</label>
          <input class="form-control" id="subNextDate" type="date" required />
        </div>
        <div class="col-12">
          <button class="btn btn-primary" type="submit">Добавить</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Список</div>
    <div class="card-body">
      <div id="subsEmpty" class="text-muted d-none">Пока подписок нет</div>
      <div class="table-responsive">
        <table class="table table-striped align-middle mb-0">
          <thead>
          <tr>
            <th>Название</th>
            <th>Цена</th>
            <th>Цикл</th>
            <th>След. платёж</th>
            <th style="width: 1%"></th>
          </tr>
          </thead>
          <tbody id="subsTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="payly.js"></script>
<script>
  const errorEl = document.getElementById("contentError");
  const successEl = document.getElementById("contentSuccess");
  const importFromEmailBtn = document.getElementById("importFromEmailBtn");
  const emailCandidatesCard = document.getElementById("emailCandidatesCard");
  const emailCandidatesMeta = document.getElementById("emailCandidatesMeta");
  const emailCandidatesList = document.getElementById("emailCandidatesList");
  const emailCandidatesImportBtn = document.getElementById("emailCandidatesImportBtn");
  const emailCandidatesCancelBtn = document.getElementById("emailCandidatesCancelBtn");
  const userEmailEl = document.getElementById("userEmail");
  const logoutBtn = document.getElementById("logoutBtn");
  const loginLink = document.getElementById("loginLink");
  const subsTbody = document.getElementById("subsTbody");
  const subsEmpty = document.getElementById("subsEmpty");

  let currentEmailProvider = null;

  function setSuccess(el, message) {
    if (!el) return;
    el.textContent = message || "";
    el.classList.toggle("d-none", !message);
  }

  function renderSubs(items) {
    subsTbody.innerHTML = "";
    subsEmpty.classList.toggle("d-none", items.length !== 0);

    for (const s of items) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${escapeHtml(s.name)}</td>
        <td>${Number(s.price).toFixed(2)}</td>
        <td>${escapeHtml(s.billing_cycle)}</td>
        <td>${escapeHtml(String(s.next_payment_date))}</td>
        <td>
          <button class="btn btn-sm btn-outline-danger" data-id="${s.id}">Удалить</button>
        </td>
      `;
      tr.querySelector("button").addEventListener("click", async () => {
        try {
          setFormError(errorEl, "");
          await apiFetch(`/subscriptions/${s.id}`, { method: "DELETE", auth: true });
          await loadSubs();
        } catch (err) {
          setFormError(errorEl, err.message || "Ошибка удаления");
        }
      });
      subsTbody.appendChild(tr);
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function loadMe() {
    const token = getToken();
    if (!token) {
      window.location.href = "auth.html";
      return null;
    }
    try {
      const me = await apiFetch("/me", { auth: true });
      userEmailEl.textContent = me.email;
      logoutBtn.classList.remove("d-none");
      loginLink.classList.add("d-none");
      return me;
    } catch (err) {
      clearToken();
      window.location.href = "auth.html";
      return null;
    }
  }

  async function loadSubs() {
    const items = await apiFetch("/subscriptions/", { auth: true });
    renderSubs(items || []);
  }

  function hideEmailCandidates() {
    if (emailCandidatesCard) emailCandidatesCard.classList.add("d-none");
    if (emailCandidatesList) emailCandidatesList.innerHTML = "";
    if (emailCandidatesImportBtn) emailCandidatesImportBtn.disabled = true;
  }

  function renderEmailCandidates(provider, candidates) {
    currentEmailProvider = provider;
    const list = candidates || [];

    emailCandidatesMeta.textContent = list.length
      ? `Найдено кандидатов: ${list.length}. Отметьте нужные для импорта.`
      : "Кандидаты не найдены (парсер не смог извлечь данные из писем).";

    emailCandidatesList.innerHTML = "";

    if (!list.length) {
      emailCandidatesImportBtn.disabled = true;
      return;
    }

    list.forEach((c, idx) => {
      const wrapper = document.createElement("div");
      wrapper.className = "form-check";

      const id = `emailCand_${idx}`;
      wrapper.innerHTML = `
        <input class="form-check-input" type="checkbox" name="emailCandidateKeys" value="${escapeHtml(c.candidate_key)}" id="${id}" checked />
        <label class="form-check-label" for="${id}">
          ${escapeHtml(c.name)} | ${Number(c.price).toFixed(2)} | ${escapeHtml(c.billing_cycle)} | ${escapeHtml(String(c.next_payment_date))}
        </label>
      `;

      emailCandidatesList.appendChild(wrapper);
    });

    emailCandidatesImportBtn.disabled = false;
  }

  document.getElementById("createSubForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    setFormError(errorEl, "");

    const name = document.getElementById("subName").value.trim();
    const price = Number(document.getElementById("subPrice").value);
    const billing_cycle = document.getElementById("subCycle").value;
    const next_payment_date = document.getElementById("subNextDate").value;

    try {
      await apiFetch("/subscriptions/", {
        method: "POST",
        auth: true,
        body: { name, price, billing_cycle, next_payment_date },
      });
      e.target.reset();
      await loadSubs();
    } catch (err) {
      setFormError(errorEl, err.message || "Ошибка создания подписки");
    }
  });

  logoutBtn.addEventListener("click", async () => {
    try {
      await apiFetch("/logout", { method: "POST", auth: true });
    } catch (_) {
      // ignore
    } finally {
      clearToken();
      window.location.href = "auth.html";
    }
  });

  importFromEmailBtn.addEventListener("click", async () => {
    setFormError(errorEl, "");
    setSuccess(successEl, "");

    const input = window.prompt("Какой сервис использовать для подстановки подписок: gmail или mail.ru (НЕДОСТУПЕН)?", "gmail");
    if (!input) return;

    const raw = String(input).trim().toLowerCase();
    let provider = null;
    if (raw === "gmail") provider = "gmail";
    if (raw === "mail.ru" || raw === "mailru") alert('Сервис в разработке!');

    if (!provider) {
      setFormError(errorEl, "Неверно указан сервис. Введите `gmail`.");
      return;
    }

    try {
      const preview = await apiFetch(`/integrations/${provider}/sync-subscriptions/preview`, { method: "POST", auth: true });
      renderEmailCandidates(provider, preview && preview.candidates ? preview.candidates : []);
      emailCandidatesCard.classList.remove("d-none");
      setSuccess(successEl, "");
    } catch (err) {
      const msg = err.message || "";
      if (err.status === 400 && msg.toLowerCase().includes("provider not connected")) {
        const res = await apiFetch(`/integrations/${provider}/oauth/start`, { method: "POST", auth: true });
        if (!res || !res.authorization_url) {
          throw new Error("Не удалось получить URL авторизации");
        }
        window.location.href = res.authorization_url;
        return;
      }

      setFormError(errorEl, err.message || "Ошибка предпросмотра импорта подписок");
    }
  });

  emailCandidatesCancelBtn.addEventListener("click", async () => {
    setFormError(errorEl, "");
    setSuccess(successEl, "");
    hideEmailCandidates();
  });

  emailCandidatesImportBtn.addEventListener("click", async () => {
    if (!currentEmailProvider) return;
    setFormError(errorEl, "");
    setSuccess(successEl, "");

    const checked = Array.from(document.querySelectorAll('input[name="emailCandidateKeys"]:checked'));
    const candidate_keys = checked.map((el) => el.value);

    if (!candidate_keys.length) {
      setFormError(errorEl, "Выберите хотя бы одного кандидата.");
      return;
    }

    try {
      const result = await apiFetch(`/integrations/${currentEmailProvider}/sync-subscriptions/import`, {
        method: "POST",
        auth: true,
        body: { candidate_keys },
      });
      setSuccess(successEl, `Импорт готов: создано ${result.created}, обновлено ${result.updated}.`);
      hideEmailCandidates();
      await loadSubs();
    } catch (err) {
      setFormError(errorEl, err.message || "Ошибка импорта подписок");
    }
  });

  (async () => {
    await loadMe();

    const params = new URLSearchParams(window.location.search);
    const connected = params.get("connected");
    const provider = (params.get("provider") || "").toLowerCase();

    if (connected === "1" && (provider === "gmail" || provider === "mailru")) {
      try {
        const preview = await apiFetch(`/integrations/${provider}/sync-subscriptions/preview`, { method: "POST", auth: true });
        renderEmailCandidates(provider, preview && preview.candidates ? preview.candidates : []);
        emailCandidatesCard.classList.remove("d-none");
        setSuccess(successEl, "");
      } catch (err) {
        setFormError(errorEl, err.message || "Ошибка предпросмотра импорта подписок");
      } finally {
        const url = new URL(window.location.href);
        url.searchParams.delete("connected");
        url.searchParams.delete("provider");
        window.history.replaceState({}, "", url.toString());
      }
    }

    await loadSubs();
  })();
</script>
</body>
</html>
