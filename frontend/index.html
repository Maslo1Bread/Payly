transform: scale(1.1);
transition: transform 0.20s ease-in;

        * {
    padding: 0;
    margin: 0;
}

body {
    font-family: "Arial Black";
    background: no-repeat center center fixed linear-gradient(60deg, #800080, #0000FF);
    -webkit-background-size: cover;
    -moz-background-size: cover;
    -o-background-size: cover;
    background-size: cover;
    color: aliceblue;
}

.card {
    border-radius: 25px;
    margin: 10px;
    width: 60%;
    margin-left: 5%;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgba(0, 0, 0, 0.3);
    height: 5%;
    width: 100%;
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
}

.btn-lg {
    width: 100%;
    height: 150%;
}

.btnStart1 {
    border-top-left-radius: 30px;
    border-bottom-right-radius: 30px;
    display: flex;
    justify-content: center;
}

.auth-content {
    position: relative;
    min-height: 520px;
}

.auth-card {
    z-index: 1;
}

.auth-squares {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
}

.auth-square {
    position: absolute;
    left: var(--x);
    top: var(--y);
    width: var(--size);
    height: var(--size);
    transform: translate(-50%, -50%) rotate(var(--start));
    background: var(--fill);
    border: 2px solid var(--border);
    box-shadow: 0 0 22px rgba(127, 204, 172, 0.14);
    animation: authSpin var(--dur) linear infinite;
    border-radius: 8px;
}

@keyframes authSpin {
    from {
        transform: translate(-50%, -50%) rotate(var(--start));
    }
    to {
        transform: translate(-50%, -50%) rotate(calc(var(--start) + 360deg));
    }
}

@media (prefers-reduced-motion: reduce) {
    .auth-square {
        animation: none;
    }
}



    </style>
</head>
